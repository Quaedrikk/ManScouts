<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>ManScouts</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  :root{
    --bg:#f5f2ea;
    --card:#ffffff;
    --ink:#1a1813;
    --muted:#7a7367;
    --line:#ebe5d8;
    --accent:#e5552b;      /* flame */
    --accent-d:#c5421d;
    --green:#1f8a5b;
    --green-d:#176b46;
    --gold:#d9a441;
    --tint:#efeadd;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,system-ui,sans-serif;
    color:var(--ink);background:var(--bg);overscroll-behavior:none;-webkit-font-smoothing:antialiased;
  }
  #root{min-height:100vh;}
  .wrap{max-width:540px;margin:0 auto;padding:0 18px 120px;}
  .display{font-weight:800;letter-spacing:-.02em;line-height:1.05;}
  .label{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;font-weight:700;color:var(--muted);}
  .muted{color:var(--muted);}

  /* header */
  .topbar{position:sticky;top:0;z-index:30;background:rgba(245,242,234,.86);backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line);padding:calc(env(safe-area-inset-top) + 12px) 18px 12px;}
  .topbar .row{max-width:540px;margin:0 auto;display:flex;align-items:center;gap:9px;}
  .mark{width:30px;height:30px;border-radius:9px;background:var(--ink);display:flex;align-items:center;justify-content:center;}
  .topbar h1{margin:0;font-size:20px;font-weight:800;letter-spacing:-.03em;}
  .topbar h1 span{color:var(--accent);}

  .card{background:var(--card);border:1px solid var(--line);border-radius:20px;
    box-shadow:0 1px 2px rgba(26,24,19,.04),0 8px 24px rgba(26,24,19,.05);}

  .btn{font-weight:700;font-size:15px;border:none;border-radius:999px;padding:15px 18px;width:100%;cursor:pointer;
    background:var(--accent);color:#fff;letter-spacing:-.01em;transition:transform .08s,filter .15s;
    box-shadow:0 6px 16px rgba(229,85,43,.3);}
  .btn:active{transform:scale(.975);}
  .btn.green{background:var(--green);box-shadow:0 6px 16px rgba(31,138,91,.28);}
  .btn.dark{background:var(--ink);box-shadow:0 6px 16px rgba(26,24,19,.22);}
  .btn.ghost{background:var(--tint);color:var(--ink);box-shadow:none;}
  .btn:disabled{opacity:.45;box-shadow:none;}

  input,textarea{width:100%;font-size:16px;font-family:inherit;color:var(--ink);background:var(--card);
    border:1.5px solid var(--line);border-radius:14px;padding:13px 14px;outline:none;transition:border-color .15s;}
  input:focus,textarea:focus{border-color:var(--ink);}
  textarea{resize:none;}

  .seg{display:flex;gap:7px;flex-wrap:wrap;}
  .chip{border:none;background:var(--tint);color:var(--ink);border-radius:999px;padding:8px 14px;
    font-size:12.5px;font-weight:700;cursor:pointer;letter-spacing:-.01em;}
  .chip.on{background:var(--ink);color:#fff;}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .cell{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:16px 10px 14px;text-align:center;
    cursor:pointer;position:relative;box-shadow:0 1px 2px rgba(26,24,19,.04),0 6px 18px rgba(26,24,19,.05);
    transition:transform .1s;}
  .cell:active{transform:scale(.97);}
  .cell .nm{font-weight:800;font-size:13.5px;margin-top:9px;line-height:1.15;letter-spacing:-.01em;}
  .cell .df{font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;font-weight:800;margin-top:5px;}
  .locked .emblemwrap{filter:grayscale(.9);opacity:.5;}
  .corner{position:absolute;top:9px;right:9px;width:23px;height:23px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;}

  /* nav */
  .nav{position:fixed;left:0;right:0;bottom:0;z-index:40;background:rgba(255,255,255,.9);backdrop-filter:blur(14px);
    border-top:1px solid var(--line);display:flex;justify-content:space-around;
    padding:8px 4px calc(env(safe-area-inset-bottom) + 8px);}
  .nav button{background:none;border:none;color:var(--muted);font-weight:700;font-size:10px;letter-spacing:.02em;
    display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 12px;cursor:pointer;}
  .nav button.on{color:var(--ink);}
  .nav .navico{width:26px;height:26px;display:flex;align-items:center;justify-content:center;}

  .scrim{position:fixed;inset:0;z-index:50;background:rgba(26,20,12,.5);display:flex;align-items:flex-end;
    justify-content:center;backdrop-filter:blur(3px);}
  .sheet{width:100%;max-width:540px;max-height:94vh;overflow:auto;background:var(--bg);
    border-radius:26px 26px 0 0;padding:14px 18px calc(env(safe-area-inset-bottom) + 26px);
    animation:up .3s cubic-bezier(.2,.9,.3,1.05);}
  @keyframes up{from{transform:translateY(50px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .grip{width:42px;height:5px;border-radius:3px;background:var(--line);margin:0 auto 14px;}

  .proof{width:100%;border-radius:16px;display:block;background:#000;aspect-ratio:4/3;object-fit:cover;}
  .scene{width:100%;border-radius:16px;display:block;aspect-ratio:4/3;}

  /* post */
  .post{padding:14px;margin-bottom:16px;}
  .ph{display:flex;align-items:center;gap:10px;margin-bottom:11px;}
  .av{width:40px;height:40px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:800;font-size:15px;background-size:cover;background-position:center;}
  .cheer{display:inline-flex;align-items:center;gap:6px;background:var(--tint);border:none;border-radius:999px;
    padding:9px 14px;font-weight:700;font-size:13px;cursor:pointer;color:var(--ink);transition:transform .1s;}
  .cheer.on{background:#ffe6dc;color:var(--accent-d);}
  .cheer:active{transform:scale(.92);}

  /* sash */
  .sash{background:linear-gradient(160deg,#eaf3ee,#e7efe6);border:1px solid #d9e7df;border-radius:20px;
    padding:18px 14px;min-height:120px;}
  .sashgrid{display:flex;flex-wrap:wrap;gap:14px 10px;justify-content:center;}

  /* unlock */
  .unlock{position:fixed;inset:0;z-index:60;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:radial-gradient(circle at 50% 38%, rgba(255,255,255,.16), rgba(20,14,8,.94));overflow:hidden;padding:24px;}
  .ucard{background:var(--card);border-radius:26px;padding:30px 26px;text-align:center;max-width:340px;width:100%;
    animation:pop .55s cubic-bezier(.2,1.3,.4,1) both;box-shadow:0 30px 60px rgba(0,0,0,.4);}
  @keyframes pop{0%{transform:scale(.7);opacity:0;}100%{transform:scale(1);opacity:1;}}
  .stamp{animation:stamp .7s cubic-bezier(.18,1.4,.4,1) both;}
  @keyframes stamp{0%{transform:scale(0) rotate(-18deg);opacity:0;}55%{transform:scale(1.15) rotate(5deg);opacity:1;}100%{transform:scale(1) rotate(0);}}
  .pill{display:inline-block;background:var(--accent);color:#fff;font-weight:800;font-size:11px;letter-spacing:.12em;
    text-transform:uppercase;padding:7px 16px;border-radius:999px;}

  .pf{position:absolute;pointer-events:none;}
  .ember{width:8px;height:8px;border-radius:50%;background:radial-gradient(circle,#ffd27a,#e5552b);animation:rise 1.6s ease-out forwards;}
  @keyframes rise{0%{transform:translateY(0) scale(1);opacity:0;}15%{opacity:1;}100%{transform:translateY(-240px) scale(.3);opacity:0;}}
  .ray{width:4px;height:130px;background:linear-gradient(var(--gold),transparent);transform-origin:bottom center;animation:rayspin 1.4s ease-out forwards;}
  @keyframes rayspin{0%{transform:scaleY(0);opacity:0;}40%{opacity:.85;}100%{transform:scaleY(1);opacity:0;}}
  .rippl{border:3px solid #aee0ff;border-radius:50%;animation:ripple 1.6s ease-out forwards;}
  @keyframes ripple{from{width:20px;height:20px;opacity:.7;}to{width:360px;height:360px;opacity:0;}}
  .twk{font-size:18px;color:#ffe9a8;animation:twk 1.6s ease-in-out forwards;}
  @keyframes twk{0%{transform:scale(0);opacity:0;}40%{transform:scale(1.2);opacity:1;}100%{transform:scale(.6);opacity:0;}}
  .leaf{width:12px;height:12px;background:#5ba36a;border-radius:0 70% 0 70%;animation:drift 2s ease-in forwards;}
  @keyframes drift{0%{transform:translateY(-40px) rotate(0);opacity:0;}20%{opacity:1;}100%{transform:translateY(280px) rotate(320deg);opacity:0;}}
  .spark{width:3px;height:22px;background:linear-gradient(#fff,#f0a23a);border-radius:2px;transform-origin:center;animation:burst .9s ease-out forwards;}
  @keyframes burst{0%{transform:scale(.2);opacity:0;}30%{opacity:1;}100%{transform:scale(1) translateY(-46px);opacity:0;}}
  .conf{width:7px;height:15px;border-radius:2px;animation:fall 1.9s ease-in forwards;}
  @keyframes fall{0%{transform:translateY(-60px) rotate(0);opacity:0;}15%{opacity:1;}100%{transform:translateY(320px) rotate(380deg);opacity:0;}}
  .stitchdraw{stroke-dasharray:4 4;stroke-dashoffset:200;animation:stitch 1s .25s ease-out forwards;}
  @keyframes stitch{to{stroke-dashoffset:0;}}
  .fadeup{opacity:0;animation:fadeup .45s forwards;}
  @keyframes fadeup{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  .hide{display:none;}
  @media (prefers-reduced-motion: reduce){.stamp,.ember,.ray,.rippl,.twk,.leaf,.spark,.conf,.ucard{animation-duration:.01s!important;}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef} = React;

const mem={};
const hasStore = typeof window!=="undefined" && window.storage && typeof window.storage.get==="function";
async function sGet(k){ if(!hasStore) return mem[k]??null; try{const r=await window.storage.get(k,false);return r?r.value:null;}catch(e){return null;} }
async function sSet(k,v){ if(!hasStore){mem[k]=v;return;} try{await window.storage.set(k,v,false);}catch(e){mem[k]=v;} }

function fitCanvas(w,h,max){let s=Math.min(1,max/Math.max(w,h));const c=document.createElement("canvas");c.width=Math.round(w*s);c.height=Math.round(h*s);return c;}
function fileToProof(file){return new Promise((res,rej)=>{const url=URL.createObjectURL(file);
  if(file.type.startsWith("video")){const v=document.createElement("video");v.muted=true;v.playsInline=true;v.src=url;
    v.onloadeddata=()=>{try{v.currentTime=Math.min(1,(v.duration||2)/2);}catch(e){}};
    v.onseeked=()=>{const c=fitCanvas(v.videoWidth||640,v.videoHeight||480,900);c.getContext("2d").drawImage(v,0,0,c.width,c.height);URL.revokeObjectURL(url);res({dataUrl:c.toDataURL("image/jpeg",.6),type:"video"});};
    v.onerror=()=>{URL.revokeObjectURL(url);rej();};
  }else{const img=new Image();img.onload=()=>{const c=fitCanvas(img.width,img.height,900);c.getContext("2d").drawImage(img,0,0,c.width,c.height);URL.revokeObjectURL(url);res({dataUrl:c.toDataURL("image/jpeg",.6),type:"photo"});};img.onerror=()=>{URL.revokeObjectURL(url);rej();};img.src=url;}
});}

 {id:"summit",nm:"Summit Seeker",cat:"Wilderness",df:"Pathfinder",ico:"mountain",an:"rays",pts:50,blurb:"Climb to the top of a real peak under your own power and look back at how far you came.",how:["Pick a hill or mountain with a true summit","Hike to the top on foot","Snap proof at the marker or the view"]},

 {id:"north",nm:"True North",cat:"Wilderness",df:"Pathfinder",ico:"compass",an:"rays",pts:50,blurb:"Complete a route using only a paper map and compass.",how:["Plan a route on paper","Navigate it without GPS","Photograph map, compass, and destination"]},
 {id:"forage",nm:"Wild Harvest",cat:"Provision",df:"Pathfinder",ico:"leaf",an:"leaves",pts:50,blurb:"Identify and gather a wild edible.",how:["Positively identify a wild edible","Harvest responsibly","Photograph your find"],care:"Only eat wild plants confirmed by an expert. When unsure, don't."},

 {id:"knots",nm:"Knot Master",cat:"Craft",df:"Tenderfoot",ico:"knot",an:"sparks",pts:20,blurb:"Tie five essential knots from memory.",how:["Learn bowline, clove hitch, taut-line, figure-8, square","Tie all five without looking them up","Film yourself doing it"]},
 {id:"fix",nm:"The Mender",cat:"Craft",df:"Trailhand",ico:"wrench",an:"sparks",pts:35,blurb:"Repair something broken instead of replacing it.",how:["Find something broken","Fix it with your own hands","Photograph it working again"]},

 {id:"mentor",nm:"Pass It On",cat:"Service",df:"Trailhand",ico:"teach",an:"conf",pts:35,blurb:"Teach someone a skill you've earned.",how:["Pick a skill worth sharing","Spend real time teaching it","Capture the lesson"]},
 {id:"plant",nm:"Rootmaker",cat:"Service",df:"Tenderfoot",ico:"seed",an:"leaves",pts:20,blurb:"Plant a tree or garden and document it.",how:["Plant something that will grow for years","Water it in","Photograph the planting"]},
 {id:"blood",nm:"Lifeblood",cat:"Service",df:"Pathfinder",ico:"drop",an:"ripple",pts:50,blurb:"Donate blood.",how:["Book a donation","Give","Photograph your bandage or wristband"]},
 {id:"solo",nm:"The Lone Trail",cat:"Adventure",df:"Frontiersman",ico:"pack",an:"rays",pts:80,blurb:"Take a real trip entirely on your own.",how:["Plan a solo overnight journey","Go alone and self-reliant","Document the road and the return"]},
 {id:"stars",nm:"Skyreader",cat:"Adventure",df:"Tenderfoot",ico:"stars",an:"twinkle",pts:20,blurb:"Find and name three constellations.",how:["Get away from city light","Identify three constellations","Photograph the night sky"]},
 {id:"river",nm:"River Run",cat:"Adventure",df:"Trailhand",ico:"wave",an:"ripple",pts:35,blurb:"Paddle a stretch of moving water.",how:["Get a canoe, kayak, or raft","Run a safe stretch of river","Capture you on the water"],care:"Always wear a life vest on the water."}

const byId=id=>CH.find(c=>c.id===id);

function Badge({ch,size=82,drawn=false,rot=0}){
  const col=CATS[ch.cat].c;
  return (

function Avatar({name,handle,img,size=40}){

function Particles({an}){
  const it=[];const r=(a,b)=>a+Math.random()*(b-a);
  if(an==="embers")for(let i=0;i<24;i++)it.push(<span key={i} className="pf ember" style={{left:r(15,85)+"%",bottom:"34%",animationDelay:r(0,.8)+"s"}}/>);
  else if(an==="rays")for(let i=0;i<14;i++)it.push(<span key={i} className="pf ray" style={{left:"50%",top:"30%",transform:`rotate(${i*(360/14)}deg)`,animationDelay:r(0,.3)+"s"}}/>);
  else if(an==="ripple")for(let i=0;i<5;i++)it.push(<span key={i} className="pf rippl" style={{left:"50%",top:"40%",transform:"translate(-50%,-50%)",animationDelay:i*.28+"s"}}/>);
  else if(an==="twinkle")for(let i=0;i<22;i++)it.push(<span key={i} className="pf twk" style={{left:r(6,94)+"%",top:r(12,72)+"%",animationDelay:r(0,1.1)+"s"}}>✦</span>);
  else if(an==="leaves")for(let i=0;i<22;i++)it.push(<span key={i} className="pf leaf" style={{left:r(8,92)+"%",top:r(2,28)+"%",animationDelay:r(0,.9)+"s",background:i%2?"#5ba36a":"#cf8a32"}}/>);
  else if(an==="sparks")for(let i=0;i<18;i++)it.push(<span key={i} className="pf spark" style={{left:"50%",top:"40%",transform:`rotate(${i*20}deg)`,animationDelay:r(0,.2)+"s"}}/>);
  else{const cs=["#e5552b","#1f8a5b","#d9a441","#6d4ea8"];for(let i=0;i<28;i++)it.push(<span key={i} className="pf conf" style={{left:r(4,96)+"%",top:r(0,18)+"%",background:cs[i%4],animationDelay:r(0,.7)+"s"}}/>);}
  return <>{it}</>;
}

function App(){
  const [ready,setReady]=useState(false);
  const [profile,setProfile]=useState(null);
  const [posts,setPosts]=useState([]);
  const [proofs,setProofs]=useState({});
  const [cheers,setCheers]=useState({});
  const [tab,setTab]=useState("board");
  const [fCat,setFCat]=useState("All");
  const [fDiff,setFDiff]=useState("All");
  const [detail,setDetail]=useState(null);
  const [earn,setEarn]=useState(null);
  const [unlock,setUnlock]=useState(null);
  const [editing,setEditing]=useState(false);

  useEffect(()=>{(async()=>{
    const p=await sGet("ms:profile"); if(p) setProfile(JSON.parse(p));
    const idx=await sGet("ms:posts"); const arr=idx?JSON.parse(idx):[]; setPosts(arr);
    const pr={}; for(const po of arr){const d=await sGet("ms:proof:"+po.id); if(d) pr[po.id]=d;} setProofs(pr);
    const ch=await sGet("ms:cheers"); if(ch) setCheers(JSON.parse(ch));
    setReady(true);
  })();},[]);

  const earnedIds=new Set(posts.map(p=>p.cid));
  const totalPts=posts.reduce((s,p)=>s+(byId(p.cid)?.pts||0),0);

  async function saveProfile(pf){setProfile(pf);await sSet("ms:profile",JSON.stringify(pf));}
  async function toggleCheer(id){const n={...cheers,[id]:!cheers[id]};setCheers(n);await sSet("ms:cheers",JSON.stringify(n));}
  async function commitBadge(cid,proof,place,wn,wh,note){
    const id="p"+Date.now();
    const post={id,cid,date:new Date().toISOString(),place,witnessName:wn,witnessHandle:wh,note,ptype:proof.type};
    const next=[post,...posts]; setPosts(next); setProofs(p=>({...p,[id]:proof.dataUrl}));
    await sSet("ms:proof:"+id,proof.dataUrl); await sSet("ms:posts",JSON.stringify(next));
    setEarn(null); setUnlock(byId(cid));
  }

  if(!ready) return <div style={{padding:80,textAlign:"center"}} className="display muted">Loading…</div>;
  if(!profile) return <Onboard onDone={saveProfile}/>;

  const list=CH.filter(c=>(fCat==="All"||c.cat===fCat)&&(fDiff==="All"||c.df===fDiff));

  return (
   <div>
    <div className="topbar"><div className="row">
      <div className="mark"><svg width="18" height="18" viewBox="0 0 100 100"><g fill="none" stroke="#fff" strokeWidth="8" strokeLinejoin="round" strokeLinecap="round"><path d="M16 78 L42 30 L58 56 L72 38 L88 78 Z"/></g></svg></div>
      <h1>Man<span>Scouts</span></h1>
    </div></div>

    <div className="wrap">
      {tab==="board" && <Board profile={profile} posts={posts} proofs={proofs} cheers={cheers}
          onCheer={toggleCheer} onPick={setDetail} go={()=>setTab("trail")}/>}
      {tab==="trail" && <Trail list={list} earnedIds={earnedIds} fCat={fCat} setFCat={setFCat} fDiff={fDiff} setFDiff={setFDiff} onPick={setDetail}/>}
      {tab==="sash" && <Sash profile={profile} posts={posts} proofs={proofs} totalPts={totalPts} onEdit={()=>setEditing(true)} onPick={setDetail}/>}
      {tab==="witness" && <Witness/>}
    </div>

    <div className="nav">
      <Tab id="board" tab={tab} set={setTab} ico="board" label="Board"/>
      <Tab id="trail" tab={tab} set={setTab} ico="mountain" label="Trail"/>
      <Tab id="sash" tab={tab} set={setTab} ico="pack" label="Sash"/>
      <Tab id="witness" tab={tab} set={setTab} ico="hands" label="Witness"/>
    </div>

    {detail && <Detail ch={detail} earned={earnedIds.has(detail.id)} post={posts.find(p=>p.cid===detail.id)}
        proof={(()=>{const po=posts.find(p=>p.cid===detail.id);return po?proofs[po.id]:null;})()}
        onClose={()=>setDetail(null)} onStart={()=>{setEarn(detail);setDetail(null);}}/>}
    {earn && <EarnFlow ch={earn} onCancel={()=>setEarn(null)} onCommit={commitBadge}/>}
    {unlock && <Unlock ch={unlock} onClose={()=>{setUnlock(null);setTab("board");}}/>}
    {editing && <Onboard initial={profile} onDone={p=>{saveProfile(p);setEditing(false);}} onCancel={()=>setEditing(false)}/>}
   </div>
  );
}
function Tab({id,tab,set,ico,label}){
  return <button className={tab===id?"on":""} onClick={()=>set(id)}>
    <span className="navico"><svg width="24" height="24" viewBox="0 0 100 100"><g style={{stroke:tab===id?"#1a1813":"#7a7367"}}><Ico name={ico}/></g></svg></span>{label}</button>;

function Onboard({onDone,initial,onCancel}){

        <div className="label" style={{margin:"14px 0 6px"}}>Bio</div>

        <div style={{height:18}}/>
        <button className="btn" disabled={!valid} onClick={()=>onDone({name:name.trim(),handle:handle.startsWith("@")?handle:"@"+handle,bio,avatar})}>{initial?"Save":"Start"}</button>

function fmtAgo(iso){const s=(Date.now()-new Date(iso).getTime())/1000;
  if(s<60)return"now";if(s<3600)return Math.floor(s/60)+"m";if(s<86400)return Math.floor(s/3600)+"h";return Math.floor(s/86400)+"d";}
function fmtFull(iso){const d=new Date(iso);return d.toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric"})+" · "+d.toLocaleTimeString(undefined,{hour:"numeric",minute:"2-digit"});}

function CheerBtn({id,base,cheers,onCheer}){

}

  const [wn,setWn]=useState("");const [wh,setWh]=useState("");const [witnessed,setWitnessed]=useState(false);
  const fileRef=useRef();
  async function pick(e){const f=e.target.files[0];if(!f)return;setBusy(true);try{setProof(await fileToProof(f));}catch(err){alert("Couldn't read that file — try another.");}setBusy(false);}
  return (
    <div className="scrim" onClick={onCancel}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div className="grip"/>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
          <Badge ch={ch} size={50}/><div><div className="label">Earning</div>
          <div className="display" style={{fontSize:19}}>{ch.nm}</div></div>
        </div>
        <div className="seg" style={{marginBottom:18}}>{["Proof","Place","Witness"].map((s,i)=>
          <span key={s} className={"chip"+(step===i?" on":"")} style={{flex:1,textAlign:"center"}}>{i+1} {s}</span>)}</div>

        {step===0 && <div>
          <p className="muted" style={{fontSize:14,margin:"0 0 12px"}}>Every badge needs proof. Add a photo or video of you doing it.</p>
          {proof ? <div className="card" style={{padding:8}}><img className="proof" src={proof.dataUrl}/>
              <div className="muted" style={{textAlign:"center",fontSize:12.5,marginTop:6}}>{proof.type==="video"?"Video frame captured":"Photo added"}</div></div>
            : <div onClick={()=>fileRef.current.click()} className="card" style={{padding:38,textAlign:"center",cursor:"pointer",borderStyle:"dashed"}}>
              <div style={{width:46,height:46,margin:"0 auto 10px",opacity:.5}}><svg viewBox="0 0 100 100"><g style={{stroke:"#7a7367"}}><Ico name="board"/></g></svg></div>
              <div className="display" style={{fontSize:15,color:"var(--muted)"}}>{busy?"Reading…":"Tap to add proof"}</div></div>}
          <input ref={fileRef} type="file" accept="image/*,video/*" onChange={pick} className="hide"/>
          <div style={{height:14}}/>
          {proof && <><button className="btn ghost" onClick={()=>fileRef.current.click()}>Replace</button><div style={{height:10}}/></>}
          <button className="btn" disabled={!proof} onClick={()=>setStep(1)}>Next</button>
        </div>}

        {step===1 && <div>
          <div className="label" style={{marginBottom:6}}>Where?</div>
          <input value={place} onChange={e=>setPlace(e.target.value)} placeholder="Mount Tamalpais, CA"/>
          <div className="label" style={{margin:"14px 0 6px"}}>Caption (optional)</div>
          <textarea rows="3" value={note} onChange={e=>setNote(e.target.value)} placeholder="How'd it go?"/>
          <div style={{height:16}}/>
          <button className="btn" disabled={!place.trim()} onClick={()=>setStep(2)}>Next</button>
          <div style={{height:10}}/><button className="btn ghost" onClick={()=>setStep(0)}>Back</button>
        </div>}

        {step===2 && <div>
          <p className="muted" style={{fontSize:14,margin:"0 0 12px"}}>No badge is self-awarded. A fellow scout has to vouch for it.</p>
          <div className="label" style={{marginBottom:6}}>Witness name</div>
          <input value={wn} onChange={e=>setWn(e.target.value)} placeholder="Who saw you do it?"/>
          <div className="label" style={{margin:"12px 0 6px"}}>Their handle</div>
          <input value={wh} onChange={e=>setWh(e.target.value)} placeholder="@theirhandle"/>
          <div onClick={()=>wn.trim()&&setWitnessed(!witnessed)} style={{marginTop:16,display:"flex",alignItems:"center",gap:12,
            padding:14,borderRadius:14,border:"1.5px solid var(--line)",background:witnessed?"var(--green)":"var(--card)",
            color:witnessed?"#fff":"var(--ink)",cursor:wn.trim()?"pointer":"default",opacity:wn.trim()?1:.5}}>
            <span style={{width:24,height:24,borderRadius:7,border:"2px solid currentColor",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13}}>{witnessed?"✓":""}</span>
            <span style={{fontSize:13.5,fontWeight:600}}>{wn.trim()||"Witness"} saw this and vouches for it.</span>
          </div>
          <div style={{height:18}}/>
          <button className="btn green" disabled={!(wn.trim()&&witnessed)}
            onClick={()=>onCommit(ch.id,proof,place.trim(),wn.trim(),wh.startsWith("@")||!wh?wh:"@"+wh,note.trim())}>Post & award badge</button>
          <div style={{height:10}}/><button className="btn ghost" onClick={()=>setStep(1)}>Back</button>
        </div>}
      </div>
    </div>
  );
}

function Unlock({ch,onClose}){
  return (
    <div className="unlock">
      <Particles an={ch.an}/>
      <div className="ucard">
        <div className="stamp"><Badge ch={ch} size={140} drawn={true}/></div>
        <div style={{marginTop:18}} className="fadeup"><span className="pill">Badge unlocked</span></div>
        <div className="display" style={{fontSize:24,marginTop:14}}>{ch.nm}</div>
        <div className="muted" style={{fontSize:13,fontWeight:700,letterSpacing:".06em",marginTop:4}}>+{ch.pts} PTS · {ch.df.toUpperCase()}</div>
        <div style={{height:22}}/>
        <button className="btn" onClick={onClose}>Post to the board</button>
      </div>
    </div>
  );
}

function Sash({profile,posts,proofs,totalPts,onEdit,onPick}){
  const earned=posts.map(p=>({...p,ch:byId(p.cid)})).filter(p=>p.ch);
  return (
    <div>
      <div className="card" style={{padding:16,marginTop:18,display:"flex",gap:14,alignItems:"center"}}>
        <Avatar name={profile.name} handle={profile.handle} img={profile.avatar} size={64}/>
        <div style={{flex:1,minWidth:0}}>
          <div className="display" style={{fontSize:20}}>{profile.name}</div>
          <div className="muted" style={{fontSize:13}}>{profile.handle}</div>
          {profile.bio && <div className="muted" style={{fontSize:13,marginTop:3}}>{profile.bio}</div>}
        </div>
      </div>
      <div style={{display:"flex",gap:12,margin:"12px 0"}}>
        <div className="card" style={{flex:1,padding:"14px 8px",textAlign:"center"}}>
          <div className="display" style={{color:"var(--accent)",fontSize:26}}>{earned.length}</div><div className="label" style={{marginTop:3}}>Badges</div></div>
        <div className="card" style={{flex:1,padding:"14px 8px",textAlign:"center"}}>
          <div className="display" style={{color:"var(--accent)",fontSize:26}}>{totalPts}</div><div className="label" style={{marginTop:3}}>Points</div></div>
        <div className="card" style={{flex:1,padding:"14px 8px",textAlign:"center",cursor:"pointer"}} onClick={onEdit}>
          <div style={{width:24,height:24,margin:"0 auto"}}><svg viewBox="0 0 24 24" fill="none" stroke="#7a7367" strokeWidth="2"><path d="M4 20h4l10-10-4-4L4 16z"/></svg></div>
          <div className="label" style={{marginTop:7}}>Edit</div></div>
      </div>
      <div className="label" style={{margin:"6px 2px 8px"}}>The Sash</div>
      <div className="sash">
        {earned.length===0 ? <div className="muted" style={{textAlign:"center",fontSize:13,padding:"22px 8px"}}>Empty for now. Earn a badge and it gets stitched on here.</div>
          : <div className="sashgrid">{earned.map((p,i)=><div key={p.id} onClick={()=>onPick(p.ch)} style={{cursor:"pointer"}}><Badge ch={p.ch} size={62} rot={(i%3-1)*5}/></div>)}</div>}
      </div>
      <div className="label" style={{margin:"22px 2px 10px"}}>Field log</div>
      {earned.length===0 && <p className="muted" style={{textAlign:"center",fontSize:13,padding:12}}>Earned challenges show here with proof, place and witness.</p>}
      {earned.map(p=>(
        <div key={p.id} className="card post">
          <div className="ph">
            <Badge ch={p.ch} size={44}/>
            <div style={{flex:1}}><div style={{fontWeight:800,fontSize:15}}>{p.ch.nm}</div>
              <div className="muted" style={{fontSize:12.5}}>{fmtFull(p.date)}</div></div>
            <span className="chip" style={{background:DIFFS[p.ch.df].c,color:"#fff",fontSize:10}}>{p.ch.df}</span>
          </div>
          {proofs[p.id] && <img className="proof" src={proofs[p.id]}/>}
          <div className="muted" style={{marginTop:9,fontSize:13,lineHeight:1.6}}>
            {p.place && <div>📍 {p.place}</div>}
            <div>Witnessed by <b style={{color:"var(--ink)"}}>{p.witnessName}</b> {p.witnessHandle}</div>
            {p.note && <div style={{marginTop:5,fontStyle:"italic"}}>"{p.note}"</div>}
          </div>
        </div>
      ))}
    </div>
  );
}

function Witness(){
  const [code,setCode]=useState("");const [done,setDone]=useState(false);
  return (
    <div>
      <div className="display" style={{fontSize:26,margin:"18px 2px 4px"}}>Witness</div>
      <p className="muted" style={{fontSize:13.5,margin:"0 2px 16px"}}>Co-sign a scout's challenge so their badge counts.</p>
      <div className="card" style={{padding:18,textAlign:"center"}}>
        <div style={{width:54,height:54,margin:"0 auto 10px"}}><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="46" fill="var(--green)"/><Ico name="hands"/></svg></div>
        <div style={{fontSize:14,lineHeight:1.5}} className="muted">When a scout finishes a challenge they send you a witness code. Enter it to confirm you saw it happen.</div>
      </div>
      <div className="card" style={{padding:16,marginTop:14}}>
        <div className="label" style={{marginBottom:6}}>Witness code</div>
        <input value={code} onChange={e=>{setCode(e.target.value.toUpperCase());setDone(false);}} placeholder="OAK-1492"/>
        <div style={{height:14}}/>
        {done ? <div className="card" style={{padding:14,textAlign:"center",background:"var(--green)",border:"none",color:"#fff",fontWeight:800}}>Vouched. Badge confirmed.</div>
          : <button className="btn green" disabled={code.trim().length<3} onClick={()=>setDone(true)}>Confirm I witnessed it</button>}
      </div>
      <p className="muted" style={{textAlign:"center",fontSize:12.5,margin:"16px 10px",lineHeight:1.5}}>
        On one phone the witness step runs locally during the earn flow. In the shipped app, codes pass between two installs so the witness signs from their own device.
      </p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
